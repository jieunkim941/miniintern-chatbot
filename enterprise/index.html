<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>미니인턴 기업회원 AI 챗봇 프로토타입</title>
<link rel="icon" href="./favicon.ico">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="bg-guide">
  오른쪽 아래 챗봇 버튼을 클릭해보세요.
  <div class="bg-trigger-info">
    <p>테스트 트리거 (직접 입력 모드에서 입력)</p>
    <p>• "로그인" → 로그인/비로그인 상태 토글</p>
    <p>• "채팅 종료" → 대화 종료 처리</p>
    <p>• "어려운 질문" → 대화 내역 메일 전송 플로우</p>
  </div>
</div>

<div class="phone">
  <!-- Header -->
  <div class="header">
    <button class="back-btn" id="backBtn" style="display:none;">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
        <path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8l8 8l1.41-1.41L7.83 13H20z"/>
      </svg>
    </button>
    <div class="avatar">
      <img src="./mi-bot.svg" width="36" height="36" style="border-radius:50%;">
    </div>
    <div class="header-name" id="headerTitle">미니인턴 기업회원 AI 챗봇</div>
    <button class="history-btn" id="historyBtn" onclick="switchTab('history')" title="대화 내역">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2m0 2v9h-3.56c-.36 0-.68.19-.86.5c-.52.9-1.47 1.5-2.58 1.5s-2.06-.6-2.58-1.5a1 1 0 0 0-.86-.5H5V5z"/></svg>
    </button>
  </div>

  <!-- Chat Body -->
  <div class="chat-body" id="chatBody"></div>

  <!-- History Panel -->
  <div class="history-panel" id="historyPanel" style="display:none;"></div>
  <button class="new-chat-btn" id="newChatBtn" style="display:none;" onclick="newChatFromHistory()">+ 새 대화</button>

  <!-- Input Bar -->
  <div class="input-bar-wrap">
    <div class="input-container" id="inputContainer">
      <textarea class="input-field" id="inputField" rows="1" placeholder="메시지를 입력해 주세요."
        onkeydown="handleInputKeydown(event)"
        oninput="handleInputChange(this)"
        onfocus="document.getElementById('inputContainer').classList.add('focused')"
        onblur="document.getElementById('inputContainer').classList.remove('focused')"></textarea>
      <div class="input-bottom">
        <span class="input-counter" id="inputCounter">0 / 300</span>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
            <path fill="currentColor" d="m3.4 20.4l17.45-7.48a1 1 0 0 0 0-1.84L3.4 3.6a.993.993 0 0 0-1.39.91L2 9.12c0 .5.37.93.87.99L17 12L2.87 13.88c-.5.07-.87.5-.87 1l.01 4.61c0 .71.73 1.2 1.39.91"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="input-error-msg" id="inputError">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7.99989 13.3523C8.96154 13.3523 9.85819 13.1065 10.6915 12.6148C11.4921 12.1563 12.156 11.4927 12.6148 10.6923C13.1065 9.85903 13.3523 8.96154 13.3523 7.99989C13.3523 7.03824 13.1065 6.14159 12.6148 5.30827C12.1563 4.5077 11.4927 3.84381 10.6923 3.38497C9.85903 2.89332 8.96154 2.64749 7.99989 2.64749C7.03824 2.64749 6.14159 2.89332 5.30827 3.38497C4.5077 3.84346 3.84381 4.50707 3.38497 5.30744C2.89332 6.14076 2.64749 7.03824 2.64749 7.99989C2.64749 8.96154 2.89332 9.85819 3.38497 10.6915C3.84346 11.4921 4.50707 12.156 5.30744 12.6148C6.14076 13.1065 7.03824 13.3523 7.99989 13.3523ZM7.99989 1.33334C9.21821 1.33334 10.3449 1.63751 11.3815 2.24666C12.3713 2.80911 13.1907 3.62852 13.7531 4.61829C14.3586 5.6418 14.6743 6.81072 14.6664 7.99989C14.6743 9.18906 14.3586 10.358 13.7531 11.3815C13.1907 12.3713 12.3713 13.1907 11.3815 13.7531C10.358 14.3586 9.18906 14.6743 7.99989 14.6664C6.81072 14.6743 5.6418 14.3586 4.61829 13.7531C3.62996 13.1814 2.81144 12.3571 2.24666 11.3648C1.64274 10.3468 1.32704 9.18361 1.33334 7.99989C1.33334 6.79242 1.63751 5.67077 2.24666 4.63495C2.82068 3.64407 3.64407 2.82068 4.63495 2.24666C5.65304 1.64274 6.81618 1.32704 7.99989 1.33334ZM7.34324 4.64995H8.65655V8.65655H7.34324V4.64995ZM7.34324 10.0032H8.65655V11.349H7.34324V10.0032Z" fill="#FF0322"/></svg>
      300자 이하로 작성해주세요.
    </div>
  </div>
</div>

<!-- FAB Button -->
<button class="fab" id="fabBtn" onclick="toggleChat()">
  <svg class="fab-icon fab-open" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"><path fill="currentColor" d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2m0 14H5.17L4 17.17V4h16z"/></svg>
  <svg class="fab-icon fab-close" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M19 6.41L17.59 5L12 10.59L6.41 5L5 6.41L10.59 12L5 17.59L6.41 19L12 13.41L17.59 19L19 17.59L13.41 12z"/></svg>
</button>

<script src="app.js"></script>
</body>
</html>
