<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="stylesheet" href="styles.css">
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
*, *::before, *::after { animation: none !important; transition: none !important; }
body { background: #E8EAED; padding: 40px; font-family: 'Pretendard', sans-serif; }
.bg-guide { display: none; }
.phone { display: flex !important; position: static !important; box-shadow: 0 4px 20px rgba(0,0,0,0.1) !important; }
.showcase { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 48px; }
.case-wrap { display: flex; flex-direction: column; gap: 8px; }
.case-title { font-size: 16px; font-weight: 700; color: #1A1B1C; }
.case-desc { font-size: 12px; color: #94999E; margin-bottom: 4px; }
</style>
</head>
<body>
<div class="showcase">

  <!-- Case 14. 300자 정상 -->
  <div class="case-wrap">
    <div class="case-title">Case 14. 300자 입력 (정상)</div>
    <div class="case-desc">SPEC 5 — 300자 딱 맞음, 전송 가능</div>
    <div class="phone" style="height:400px; width:390px;">
      <div class="header">
        <button class="back-btn"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8l8 8l1.41-1.41L7.83 13H20z"/></svg></button>
        <div class="avatar"><img src="./mi-bot.svg" width="36" height="36" style="border-radius:50%;"></div>
        <div class="header-name">직접 입력</div>
      </div>
      <div class="chat-body" style="flex:1;">
        <div class="msg-row">
          <div class="msg-avatar"><img src="./mi-bot.svg" width="28" height="28" style="border-radius:50%;"></div>
          <div class="msg-bubble bot">궁금한 내용을 직접 입력해주세요!</div>
        </div>
      </div>
      <div class="input-bar-wrap">
        <div class="input-container focused">
          <textarea class="input-field" rows="3" readonly style="pointer-events:none; height:98px; max-height:98px;">안녕하세요, 저는 현재 대학교 3학년에 재학 중인 학생입니다. 미니인턴을 통해 마케팅 분야의 인턴십에 지원하고 싶은데요, 몇 가지 궁금한 점이 있습니다. 첫째로 지원 시 필요한 서류가 무엇인지 알고 싶고, 둘째로 면접 절차가 어떻게 진행되는지 궁금합니다. 또한 인턴십 기간 동안 급여가 지급되는지, 그리고 인턴십 이후 정규직 전환 가능성이 있는지도 알고 싶습니다. 마지막으로 재학 중에도 지원이 가능한지 확인해 주시면 감사하겠습니다. 자세한 답변 부탁드립니다.</textarea>
          <div class="input-bottom">
            <span class="input-counter">300 / 300</span>
            <button class="send-btn active"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="m3.4 20.4l17.45-7.48a1 1 0 0 0 0-1.84L3.4 3.6a.993.993 0 0 0-1.39.91L2 9.12c0 .5.37.93.87.99L17 12L2.87 13.88c-.5.07-.87.5-.87 1l.01 4.61c0 .71.73 1.2 1.39.91"/></svg></button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Case 15. 글자수 초과 에러 -->
  <div class="case-wrap">
    <div class="case-title">Case 15. 글자수 초과 (에러)</div>
    <div class="case-desc">SPEC 5 — 301자 시도 시 300번째 글자 교체 + 에러 표시 + 전송 불가</div>
    <div class="phone" style="height:430px; width:390px;">
      <div class="header">
        <button class="back-btn"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8l8 8l1.41-1.41L7.83 13H20z"/></svg></button>
        <div class="avatar"><img src="./mi-bot.svg" width="36" height="36" style="border-radius:50%;"></div>
        <div class="header-name">직접 입력</div>
      </div>
      <div class="chat-body" style="flex:1;">
        <div class="msg-row">
          <div class="msg-avatar"><img src="./mi-bot.svg" width="28" height="28" style="border-radius:50%;"></div>
          <div class="msg-bubble bot">궁금한 내용을 직접 입력해주세요!</div>
        </div>
      </div>
      <div class="input-bar-wrap">
        <div class="input-container focused error">
          <textarea class="input-field" readonly style="pointer-events:none; height:98px; max-height:98px;">안녕하세요, 저는 현재 대학교 3학년에 재학 중인 학생입니다. 미니인턴을 통해 마케팅 분야의 인턴십에 지원하고 싶은데요, 몇 가지 궁금한 점이 있습니다. 첫째로 지원 시 필요한 서류가 무엇인지 알고 싶고, 둘째로 면접 절차가 어떻게 진행되는지 궁금합니다. 또한 인턴십 기간 동안 급여가 지급되는지, 그리고 인턴십 이후 정규직 전환 가능성이 있는지도 알고 싶습니다. 마지막으로 재학 중에도 지원이 가능한지 확인해 주시면 감사하겠습니다. 자세한 답변 부탁드립니다!</textarea>
          <div class="input-bottom">
            <span class="input-counter error">300 / 300</span>
            <button class="send-btn" disabled><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="m3.4 20.4l17.45-7.48a1 1 0 0 0 0-1.84L3.4 3.6a.993.993 0 0 0-1.39.91L2 9.12c0 .5.37.93.87.99L17 12L2.87 13.88c-.5.07-.87.5-.87 1l.01 4.61c0 .71.73 1.2 1.39.91"/></svg></button>
          </div>
        </div>
        <div class="input-error-msg" style="display:flex;">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7.99989 13.3523C8.96154 13.3523 9.85819 13.1065 10.6915 12.6148C11.4921 12.1563 12.156 11.4927 12.6148 10.6923C13.1065 9.85903 13.3523 8.96154 13.3523 7.99989C13.3523 7.03824 13.1065 6.14159 12.6148 5.30827C12.1563 4.5077 11.4927 3.84381 10.6923 3.38497C9.85903 2.89332 8.96154 2.64749 7.99989 2.64749C7.03824 2.64749 6.14159 2.89332 5.30827 3.38497C4.5077 3.84346 3.84381 4.50707 3.38497 5.30744C2.89332 6.14076 2.64749 7.03824 2.64749 7.99989C2.64749 8.96154 2.89332 9.85819 3.38497 10.6915C3.84346 11.4921 4.50707 12.156 5.30744 12.6148C6.14076 13.1065 7.03824 13.3523 7.99989 13.3523ZM7.99989 1.33334C9.21821 1.33334 10.3449 1.63751 11.3815 2.24666C12.3713 2.80911 13.1907 3.62852 13.7531 4.61829C14.3586 5.6418 14.6743 6.81072 14.6664 7.99989C14.6743 9.18906 14.3586 10.358 13.7531 11.3815C13.1907 12.3713 12.3713 13.1907 11.3815 13.7531C10.358 14.3586 9.18906 14.6743 7.99989 14.6664C6.81072 14.6743 5.6418 14.3586 4.61829 13.7531C3.62996 13.1814 2.81144 12.3571 2.24666 11.3648C1.64274 10.3468 1.32704 9.18361 1.33334 7.99989C1.33334 6.79242 1.63751 5.67077 2.24666 4.63495C2.82068 3.64407 3.64407 2.82068 4.63495 2.24666C5.65304 1.64274 6.81618 1.32704 7.99989 1.33334ZM7.34324 4.64995H8.65655V8.65655H7.34324V4.64995ZM7.34324 10.0032H8.65655V11.349H7.34324V10.0032Z" fill="#FF0322"/></svg>
          300자 이하로 작성해주세요.
        </div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
