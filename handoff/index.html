<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>미니인턴 AI 챗봇 프로토타입</title>
<link rel="icon" href="../favicon.ico">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="phone">
  <!-- Header -->
  <div class="header">
    <button class="back-btn" id="backBtn" onclick="goBack()" style="display:none;">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
        <path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8l8 8l1.41-1.41L7.83 13H20z"/>
      </svg>
    </button>
    <div class="avatar">
      <img src="../mi-bot.svg" width="36" height="36" style="border-radius:50%;">
    </div>
    <div class="header-name" id="headerTitle">미니인턴 AI 챗봇</div>
  </div>

  <!-- Chat Body -->
  <div class="chat-body" id="chatBody"></div>

  <!-- Input Bar -->
  <div class="input-bar">
    <input class="input-field" id="inputField" type="text" placeholder="메시지를 입력하세요..."
      onkeydown="if(event.key==='Enter'&&!event.isComposing)sendMessage()">
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
        <path fill="currentColor" d="m3.4 20.4l17.45-7.48a1 1 0 0 0 0-1.84L3.4 3.6a.993.993 0 0 0-1.39.91L2 9.12c0 .5.37.93.87.99L17 12L2.87 13.88c-.5.07-.87.5-.87 1l.01 4.61c0 .71.73 1.2 1.39.91"/>
      </svg>
    </button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
